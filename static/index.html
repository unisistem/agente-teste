<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Agent — Testes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0b0c10; --surface:#13151c; --surface2:#1c1f2b;
      --border:#252836; --accent:#00e5a0; --accent-dim:#00b37e;
      --text:#e2e4ef; --text-muted:#6b6f84; --error:#ff5c7a;
      --warn:#ffb547; --radius:10px;
      --font-ui:'Syne',sans-serif; --font-mono:'IBM Plex Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-ui);
      min-height:100vh;display:grid;grid-template-rows:auto 1fr auto}

    /* Header */
    header{padding:1.2rem 2rem;border-bottom:1px solid var(--border);
      background:var(--surface);display:flex;align-items:center;
      justify-content:space-between;gap:1rem}
    .logo{display:flex;align-items:center;gap:.75rem}
    .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;
      display:grid;place-items:center;font-size:1.1rem}
    .logo-text{font-size:1.05rem;font-weight:800;letter-spacing:-.02em}
    .logo-text span{color:var(--accent)}
    .badge{font-family:var(--font-mono);font-size:.7rem;padding:.2rem .55rem;
      border:1px solid var(--border);border-radius:20px;color:var(--text-muted)}
    .status-row{display:flex;align-items:center;gap:.5rem;font-size:.78rem}
    .status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);
      flex-shrink:0;transition:background .18s}
    .status-dot.ok{background:var(--accent)}
    .status-dot.err{background:var(--error)}
    .status-dot.busy{background:var(--warn);animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* Layout */
    main{display:grid;grid-template-columns:320px 1fr;
      height:calc(100vh - 65px - 40px);overflow:hidden}

    /* Sidebar */
    .sidebar{border-right:1px solid var(--border);background:var(--surface);
      display:flex;flex-direction:column;overflow-y:auto}
    .sb-section{padding:1.1rem 1.3rem;border-bottom:1px solid var(--border)}
    .sb-section h3{font-size:.65rem;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;color:var(--text-muted);margin-bottom:.8rem}
    label{display:block;font-size:.78rem;color:var(--text-muted);
      margin-bottom:.3rem;margin-top:.65rem}
    label:first-of-type{margin-top:0}
    input[type="text"],input[type="url"]{width:100%;background:var(--surface2);
      border:1px solid var(--border);border-radius:var(--radius);color:var(--text);
      font-family:var(--font-mono);font-size:.76rem;padding:.5rem .75rem;outline:none;
      transition:border-color .18s}
    input:focus{border-color:var(--accent)}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
    .toggle-row span{font-size:.82rem}
    .toggle{position:relative;width:38px;height:21px;flex-shrink:0}
    .toggle input{display:none}
    .toggle-track{position:absolute;inset:0;background:var(--surface2);
      border:1px solid var(--border);border-radius:99px;cursor:pointer;
      transition:background .18s,border-color .18s}
    .toggle input:checked~.toggle-track{background:var(--accent);border-color:var(--accent)}
    .toggle-thumb{position:absolute;top:3px;left:3px;width:13px;height:13px;
      background:var(--text-muted);border-radius:50%;
      transition:transform .18s,background .18s;pointer-events:none}
    .toggle input:checked~.toggle-track .toggle-thumb{transform:translateX(17px);background:#0b0c10}
    .quick-btn{width:100%;text-align:left;background:var(--surface2);
      border:1px solid var(--border);border-radius:var(--radius);color:var(--text);
      font-family:var(--font-ui);font-size:.8rem;padding:.55rem .85rem;
      margin-bottom:.4rem;cursor:pointer;transition:border-color .18s,background .18s;line-height:1.4}
    .quick-btn:hover{border-color:var(--accent);background:#1a2b24}
    .quick-btn small{display:block;font-size:.68rem;color:var(--text-muted);margin-top:.12rem}

    /* Chat */
    .chat-area{display:flex;flex-direction:column;height:100%;overflow:hidden}
    .messages{flex:1;overflow-y:auto;padding:1.25rem;
      display:flex;flex-direction:column;gap:1.1rem;scroll-behavior:smooth}
    .msg{display:flex;gap:.8rem;max-width:800px;animation:fadeIn .2s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .msg.agent{align-self:flex-start}
    .avatar{width:30px;height:30px;border-radius:7px;display:grid;
      place-items:center;font-size:.85rem;flex-shrink:0}
    .msg.user .avatar{background:#2a1f3d}
    .msg.agent .avatar{background:#0d2b22;color:var(--accent)}
    .bubble{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:.7rem .95rem;font-size:.86rem;
      line-height:1.65;max-width:640px}
    .msg.user .bubble{background:var(--surface2);border-color:#2a2d40}
    .sources{margin-top:.55rem;display:flex;flex-wrap:wrap;gap:.3rem}
    .source-tag{font-family:var(--font-mono);font-size:.66rem;padding:.18rem .5rem;
      border-radius:20px;background:#0d2b22;border:1px solid #1a4d35;color:var(--accent)}
    .fallback-tag{font-family:var(--font-mono);font-size:.66rem;padding:.18rem .5rem;
      border-radius:20px;background:#2b1a1e;border:1px solid #5c2535;color:var(--error)}
    .raw-toggle{margin-top:.45rem;font-size:.7rem;color:var(--text-muted);cursor:pointer;
      border:none;background:none;font-family:var(--font-mono);padding:0;text-decoration:underline dotted}
    .raw-toggle:hover{color:var(--text)}
    pre.raw-json{margin-top:.45rem;background:var(--bg);border:1px solid var(--border);
      border-radius:6px;padding:.65rem .85rem;font-family:var(--font-mono);font-size:.7rem;
      line-height:1.6;white-space:pre-wrap;word-break:break-all;color:#a8b0c8;display:none}
    pre.raw-json.visible{display:block}
    .typing-indicator{display:flex;gap:4px;padding:.7rem .95rem;align-items:center}
    .typing-indicator span{width:6px;height:6px;background:var(--accent);
      border-radius:50%;animation:bounce .9s infinite}
    .typing-indicator span:nth-child(2){animation-delay:.15s}
    .typing-indicator span:nth-child(3){animation-delay:.30s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:.65rem;color:var(--text-muted);text-align:center}
    .empty-icon{font-size:2.2rem;opacity:.3}
    .empty-state p{font-size:.85rem;max-width:280px;line-height:1.6}

    /* Input */
    .input-bar{padding:.9rem 1.3rem;border-top:1px solid var(--border);
      background:var(--surface);display:flex;gap:.65rem;align-items:flex-end}
    textarea#msgInput{flex:1;background:var(--surface2);border:1px solid var(--border);
      border-radius:var(--radius);color:var(--text);font-family:var(--font-ui);
      font-size:.86rem;padding:.65rem .95rem;resize:none;outline:none;
      min-height:42px;max-height:150px;line-height:1.5;transition:border-color .18s}
    textarea#msgInput:focus{border-color:var(--accent)}
    textarea#msgInput::placeholder{color:var(--text-muted)}
    .send-btn{width:42px;height:42px;background:var(--accent);border:none;
      border-radius:var(--radius);cursor:pointer;display:grid;place-items:center;
      flex-shrink:0;transition:background .18s,transform .18s;color:#0b0c10;font-size:1rem}
    .send-btn:hover{background:var(--accent-dim)}
    .send-btn:active{transform:scale(.93)}
    .send-btn:disabled{background:var(--surface2);cursor:not-allowed;color:var(--text-muted)}

    /* Footer */
    footer{height:40px;border-top:1px solid var(--border);background:var(--surface);
      display:flex;align-items:center;justify-content:center;
      font-size:.7rem;color:var(--text-muted);font-family:var(--font-mono)}

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

    @media(max-width:650px){main{grid-template-columns:1fr}.sidebar{display:none}}
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">Python <span>Agent</span></div>
  </div>
  <div style="display:flex;gap:.75rem;align-items:center">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">aguardando...</span>
    </div>
    <span class="badge">A2 Challenge</span>
  </div>
</header>

<main>
  <aside class="sidebar">
    <div class="sb-section">
      <h3>Configuração</h3>
      <label>URL da API</label>
      <input type="url" id="apiUrl" value="" placeholder="http://localhost:8000" />
      <div style="margin-top:.8rem">
        <div class="toggle-row">
          <span>Usar session_id</span>
          <label class="toggle">
            <input type="checkbox" id="useSession" />
            <div class="toggle-track"><div class="toggle-thumb"></div></div>
          </label>
        </div>
      </div>
      <div id="sessionRow" style="display:none;margin-top:.55rem">
        <label>session_id</label>
        <input type="text" id="sessionId" placeholder="ex: sessao-123" />
      </div>
    </div>

    <div class="sb-section">
      <h3>Perguntas de Validação</h3>
      <button class="quick-btn" onclick="setQuick('O que é composição?')">
        O que é composição?<small>sources: Composição</small>
      </button>
      <button class="quick-btn" onclick="setQuick('Qual o papel da Tool de conhecimento?')">
        Qual o papel da Tool de conhecimento?<small>sources: Tool de conhecimento</small>
      </button>
      <button class="quick-btn" onclick="setQuick('A tool deve responder diretamente ao usuário?')">
        A tool responde diretamente ao usuário?<small>sources: Tool de conhecimento</small>
      </button>
      <button class="quick-btn" onclick="setQuick('Quando usar herança?')">
        Quando usar herança?<small>sources: Herança</small>
      </button>
      <button class="quick-btn" onclick="setQuick('Qual o papel da orquestração?')">
        Qual o papel da orquestração?<small>sources: Orquestração</small>
      </button>
      <button class="quick-btn" onclick="setQuick('Onde colocar regra de negócio?')">
        Onde colocar regra de negócio?<small>sources: Endpoint de API</small>
      </button>
      <button class="quick-btn" onclick="setQuick('Como agir sem contexto suficiente?')">
        Como agir sem contexto suficiente?<small>sources: [] — fallback</small>
      </button>
      <button class="quick-btn" onclick="setQuick('Qual a cotação do dólar hoje?')">
        Qual a cotação do dólar hoje?<small>sources: [] — teste de fallback</small>
      </button>
      <button class="quick-btn" onclick="setQuick('Pode resumir em uma frase?')">
        Pode resumir em uma frase?<small>teste de continuidade de sessão</small>
      </button>
    </div>

    <div class="sb-section">
      <h3>Ações</h3>
      <button class="quick-btn" onclick="clearChat()">🗑 Limpar conversa</button>
      <button class="quick-btn" onclick="checkHealth()">🔌 Verificar conexão</button>
    </div>
  </aside>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <p>Envie uma pergunta para testar o agente.<br/>Use os atalhos para validar os casos do desafio.</p>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="msgInput" rows="1" placeholder="Digite sua pergunta..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</main>

<footer>POST /messages · CORS habilitado · Ollama qwen2.5:1.5b</footer>

<script>
  document.getElementById('apiUrl').value = window.location.origin;

  document.getElementById('useSession').addEventListener('change', function() {
    document.getElementById('sessionRow').style.display = this.checked ? 'block' : 'none';
    if (this.checked && !document.getElementById('sessionId').value)
      document.getElementById('sessionId').value = 'sessao-' + Math.random().toString(36).slice(2,7);
  });

  const ta = document.getElementById('msgInput');
  ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,150)+'px'; });
  ta.addEventListener('keydown', e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} });

  function setQuick(t){ ta.value=t; ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,150)+'px'; ta.focus(); }
  function setStatus(s,t){ document.getElementById('statusDot').className='status-dot '+s; document.getElementById('statusText').textContent=t; }

  function clearChat(){
    document.getElementById('messages').innerHTML=
      '<div class="empty-state"><div class="empty-icon">💬</div><p>Conversa limpa.</p></div>';
  }

  async function checkHealth(){
    const base=document.getElementById('apiUrl').value.replace(/\/$/,'');
    setStatus('busy','verificando...');
    try{
      const r=await fetch(base+'/docs',{signal:AbortSignal.timeout(4000)});
      setStatus(r.ok?'ok':'err', r.ok?'API online ✓':'HTTP '+r.status);
    }catch{ setStatus('err','sem resposta'); }
  }

  function getContainer(){
    const m=document.getElementById('messages');
    const e=document.getElementById('emptyState');
    if(e) e.remove();
    return m;
  }

  function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function appendUser(text){
    const el=document.createElement('div'); el.className='msg user';
    el.innerHTML=`<div class="avatar">👤</div><div class="bubble">${esc(text)}</div>`;
    getContainer().appendChild(el); scrollBottom();
  }

  function appendTyping(){
    const el=document.createElement('div'); el.className='msg agent'; el.id='typing';
    el.innerHTML=`<div class="avatar">🤖</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    getContainer().appendChild(el); scrollBottom();
  }

  function appendAgent(data){
    const t=document.getElementById('typing'); if(t) t.remove();
    const isFallback=!data.sources||data.sources.length===0;
    const srcHtml=isFallback
      ? '<div class="sources"><span class="fallback-tag">fallback — sem contexto</span></div>'
      : '<div class="sources">'+data.sources.map(s=>`<span class="source-tag">📄 ${esc(s.section)}</span>`).join('')+'</div>';
    const rawId='raw-'+Date.now();
    const el=document.createElement('div'); el.className='msg agent';
    el.innerHTML=`<div class="avatar">🤖</div><div class="bubble">${esc(data.answer)}${srcHtml}
      <button class="raw-toggle" onclick="document.getElementById('${rawId}').classList.toggle('visible')">ver JSON</button>
      <pre class="raw-json" id="${rawId}">${esc(JSON.stringify(data,null,2))}</pre></div>`;
    getContainer().appendChild(el); scrollBottom();
  }

  function appendError(msg){
    const t=document.getElementById('typing'); if(t) t.remove();
    const el=document.createElement('div'); el.className='msg agent';
    el.innerHTML=`<div class="avatar">⚠️</div><div class="bubble" style="border-color:#5c2535;color:var(--error)">${esc(msg)}</div>`;
    getContainer().appendChild(el); scrollBottom();
  }

  async function sendMessage(){
    const message=ta.value.trim(); if(!message) return;
    const base=document.getElementById('apiUrl').value.replace(/\/$/,'');
    const useSession=document.getElementById('useSession').checked;
    const sessionId=useSession?(document.getElementById('sessionId').value.trim()||null):null;
    ta.value=''; ta.style.height='auto';
    appendUser(message); appendTyping();
    document.getElementById('sendBtn').disabled=true;
    setStatus('busy','processando...');
    const body={message}; if(sessionId) body.session_id=sessionId;
    try{
      const res=await fetch(base+'/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body), signal:AbortSignal.timeout(60000)
      });
      const json=await res.json();
      if(!res.ok){ appendError('Erro HTTP '+res.status+': '+(json.detail||JSON.stringify(json))); setStatus('err','erro '+res.status); }
      else{ appendAgent(json); setStatus('ok',(json.sources&&json.sources.length)?'resposta com fontes ✓':'fallback retornado'); }
    }catch(err){
      appendError('Falha: '+err.message+'\n\nVerifique se a API está rodando.');
      setStatus('err','sem resposta');
    }finally{ document.getElementById('sendBtn').disabled=false; ta.focus(); }
  }

  checkHealth();
</script>
</body>
</html>
